# Archivo de configuración para despliegues automáticos en Render (render.yaml)
# Para más información, visita: https://render.com/docs/yaml-spec

services:
  # Ejemplo de un servicio Web (Frontend / Fullstack Node.js con Yarn)
  - type: web
    name: mi-proyecto-yarn-web
    runtime: node
    repo: https://github.com/usuario/mi-proyecto  # Cambia por la URL de tu repositorio de GitHub o GitLab
    plan: starter                             # Opciones: free, starter, standard, etc.
    buildCommand: yarn install && yarn build   # Comando para instalar dependencias y compilar
    startCommand: yarn start                  # Comando para iniciar la aplicación en producción
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  # Ejemplo de un servicio de Base de Datos (Opcional, descomentar si es necesario)
  # databases:
  #   - name: mi-base-datos
  #     plan: starter

  # Ejemplo de una API en segundo plano / Worker (Opcional)
  # - type: worker
  #   name: mi-worker-yarn
  #   runtime: node
  #   buildCommand: yarn install
  #   startCommand: yarn worker:start